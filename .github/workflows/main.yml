name: main

on:
  push:
    branches:
      - master
      - 'beta/**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  workdir:
    name: Prepare working directory
    runs-on: [self-hosted, docker, x64]
    container:
      image: skaut/lebeda:8.3-ci
    env:
      COMPOSER_ALLOW_SUPERUSER: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Composer cache
      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      # Node/Yarn + cache
      - name: Setup Node.js (+ Yarn cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install JS deps
        run: yarn install --frozen-lockfile --non-interactive --prefer-offline
      - name: Build production assets
        run: yarn build-production

      # Výroba tarballu bez zbytečností
      - name: Create tarball
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 \
              ! -name '.git' \
              ! -name '.github' \
              ! -name 'node_modules' \
              ! -name 'log' \
              ! -name 'uploads' \
              ! -name 'temp' \
              ! -name '_temp' \
              ! -name 'workdir.tar.gz' \
              -printf '%P\0' \
            | tar -C "$GITHUB_WORKSPACE" \
              --exclude-vcs \
              --exclude='tests/_output' \
              --exclude='tests/_support/_generated' \
              --exclude='www/webtemp' \
              --null \
              --files-from=- \
              --warning=no-file-changed \
              --ignore-failed-read \
              --use-compress-program='gzip -9' \
              -cf /tmp/workdir.tar.gz
          mv /tmp/workdir.tar.gz "$GITHUB_WORKSPACE/"

      - name: Upload workdir
        uses: actions/upload-artifact@v4
        with:
          name: workdir
          path: workdir.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  # ── Rychlé kontroly sloučené do jednoho jobu (šetří I/O a čas) ──
  quick-checks:
    name: Quick Checks (CS, PHPStan, Latte, Mapping)
    runs-on: [self-hosted, docker, x64]
    needs: workdir
    environment: test
    env:
      APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
      COMPOSE_FILE: docker/docker-compose.yml:docker/docker-compose.ci.yml
      COMPOSE_PROJECT_NAME: "quick-${{ github.run_id }}-${{ github.run_attempt }}"
    steps:
      - &clean-workspace
        name: Clean workspace
        shell: bash
        run: |
          docker compose down -v || true
          if [ -z "${GITHUB_WORKSPACE:-}" ] || [ ! -d "$GITHUB_WORKSPACE" ]; then
            echo "GITHUB_WORKSPACE is not set to an existing directory."
            exit 1
          fi
          workspace="$(realpath "$GITHUB_WORKSPACE")"
          current="$(pwd -P)"
          if [ "$current" != "$workspace" ]; then
            echo "Refusing to clean outside GITHUB_WORKSPACE: PWD=$current GITHUB_WORKSPACE=$workspace"
            exit 1
          fi
          find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +

      - uses: actions/download-artifact@v4
        with: { name: workdir, path: . }

      - &extract-workdir
        name: Extract workdir
        shell: bash
        run: |
          rm -rf _tmp_unpack
          mkdir _tmp_unpack
          tar --no-overwrite-dir --no-same-owner --no-same-permissions -xzf workdir.tar.gz -C _tmp_unpack
          find _tmp_unpack -mindepth 1 -maxdepth 1 -exec mv -t . -- {} +
          rm -rf _tmp_unpack

      - name: Build CI PHP image
        run: docker compose build php-test

      - name: Coding standard
        run: make check-cs-check

      - name: PHPStan
        run: make check-phpstan

      - name: Latte lint
        run: make check-latte

      - name: Validate mapping
        run: make test-mapping

      - name: Pack migrations
        if: failure()
        shell: bash
        run: |
          docker compose run --rm -T --no-deps --entrypoint '' --user docker php-test \
            sh -lc 'tar -czf - migrations' > migrations.tar.gz || true
          if [ ! -s migrations.tar.gz ]; then
            rm -f migrations.tar.gz
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: migrations
          path: migrations.tar.gz
          if-no-files-found: ignore

      - &docker-down
        name: Clean up Docker resources
        if: always()
        shell: bash
        run: |
          docker compose down --remove-orphans -v || true

          if [ -z "${COMPOSE_PROJECT_NAME:-}" ]; then
            echo "COMPOSE_PROJECT_NAME is not set, skipping image cleanup."
            exit 0
          fi

          docker image rm \
            "${COMPOSE_PROJECT_NAME}-php-test" \
            "${COMPOSE_PROJECT_NAME}-nginx-ci" \
            2>/dev/null || true

  collect-code-coverage:
    name: Collect code coverage
    runs-on: [self-hosted, docker, x64]
    continue-on-error: true
    needs: workdir
    environment: test
    if: github.ref == 'refs/heads/master'
    env:
      APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
      COMPOSE_FILE: docker/docker-compose.yml:docker/docker-compose.ci.yml
      COMPOSE_PROJECT_NAME: "coverage-${{ github.run_id }}-${{ github.run_attempt }}"
    steps:
      - *clean-workspace
      - uses: actions/download-artifact@v4
        with: { name: workdir, path: . }
      - *extract-workdir
      - run: docker compose build php-test
      - run: make test-coverage
      - name: Export coverage XML
        shell: bash
        run: |
          docker compose run --rm -T --no-deps --entrypoint '' --user docker php-test \
            sh -lc 'cat tests/_output/coverage.xml' > coverage.xml
      - name: Prepare Codecov environment
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/home"
          echo "HOME=$RUNNER_TEMP/home" >> "$GITHUB_ENV"
      - uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          disable_safe_directory: true
          fail_ci_if_error: false
      - *docker-down

  # ── Testy ───────────────────────────────────────────────────
  tests:
    name: Tests - ${{ matrix.label }}
    runs-on: [self-hosted, docker, x64]
    needs: [workdir, quick-checks]
    timeout-minutes: 45
    environment: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Unit
            shard: unit
            port: 8091
            build_services: php-test
            command: make test-unit
          - label: Integration
            shard: integration
            port: 8092
            build_services: php-test
            command: make test-integration
          - label: Payment groups
            shard: payment-groups
            port: 8081
            build_services: php-test nginx
            command: make ci-acceptance TEST='--group payment tests/acceptance/PaymentCest.php'
          - label: Payment detail
            shard: payment-detail
            port: 8082
            build_services: php-test nginx
            command: make ci-acceptance TEST='--group payment tests/acceptance/PaymentDetailCest.php'
          - label: Payment dashboard
            shard: payment-dashboard
            port: 8083
            build_services: php-test nginx
            command: make ci-acceptance TEST='--group payment tests/acceptance/PaymentDashboardCest.php'
          - label: Invoice
            shard: invoice
            port: 8084
            build_services: php-test nginx
            command: make ci-acceptance TEST='--group invoice'
          - label: Settings and admin
            shard: settings-admin
            port: 8085
            build_services: php-test nginx
            command: make ci-acceptance TEST='--group settings --group admin'
          - label: Rest
            shard: rest
            port: 8086
            build_services: php-test nginx
            command: make ci-acceptance TEST='--skip-group payment --skip-group invoice --skip-group settings --skip-group admin'
    env:
      COMPOSE_FILE: docker/docker-compose.yml:docker/docker-compose.ci.yml
      COMPOSE_PROJECT_NAME: "test-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.shard }}"
      APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
      TRAEFIK_HOST_PORT: ${{ matrix.port }}
    steps:
      - name: Pre-clean compose project
        shell: bash
        run: docker compose down --remove-orphans -v || true
      - *clean-workspace
      - uses: actions/download-artifact@v4
        with: { name: workdir, path: . }
      - *extract-workdir
      - run: docker compose build ${{ matrix.build_services }}
      - run: ${{ matrix.command }}
      - name: Pack Codeception output
        if: always()
        shell: bash
        run: |
          docker compose run --rm -T --no-deps --entrypoint '' --user docker php-test \
            sh -lc 'tar -czf - -C tests _output' > tests-output.tar.gz || true
          if [ ! -s tests-output.tar.gz ]; then
            rm -f tests-output.tar.gz
          fi
      - name: Collect compose logs
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/logs
          docker compose ps --all > artifacts/logs/compose-ps.txt || true
          docker compose logs --no-color > artifacts/logs/compose-logs.txt || true
          tar -czf compose-logs.tar.gz -C artifacts logs || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tests-output-${{ matrix.shard }}
          path: tests-output.tar.gz
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compose-logs-${{ matrix.shard }}
          path: compose-logs.tar.gz
          if-no-files-found: ignore
      - *docker-down

  # ── Gate ────────────────────────────────────────────────────
  checks-passed:
    name: Wait for all checks
    needs: [quick-checks, tests]
    runs-on: [self-hosted, docker, x64]
    container:
      image: skaut/lebeda:8.3-ci
    steps:
      - run: true

  # ── Deploys ─────────────────────────────────────────────────
  deploy-beta:
    if: ${{ startsWith(github.ref_name, 'beta') }}
    needs: [checks-passed, workdir]
    runs-on: [self-hosted, docker, x64]
    environment: beta
    container:
      image: skaut/lebeda:8.3-ci
    env:
      DEPLOY_TARGET: beta
      PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      ROOT_DIR: /home/vu011961
      SSH_USERNAME: vu011961
      HOST: www.skauting.cz
      PORT: "11961"
      APP_ENV: ${{ vars.APP_ENV }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
      DB_FIX_TOKEN_SHA256: ${{ secrets.DB_FIX_TOKEN_SHA256 }}
      SKAUTIS_TEST_MODE: ${{ vars.SKAUTIS_TEST_MODE }}
      SEND_EMAIL: ${{ vars.SEND_EMAIL }}
      ERROR_EMAILS: ${{ vars.ERROR_EMAILS }}
      ENVIRONMENT_LABEL: ${{ vars.ENVIRONMENT_LABEL }}
      ENVIRONMENT_COLOR: ${{ vars.ENVIRONMENT_COLOR }}
      TEST_BACKGROUND: ${{ vars.TEST_BACKGROUND }}
      TRACY_SHOW_BAR: ${{ vars.TRACY_SHOW_BAR }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      GOOGLE_CREDENTIALS_FILE: ${{ vars.GOOGLE_CREDENTIALS_FILE }}
      GOOGLE_REDIRECT_URI: ${{ vars.GOOGLE_REDIRECT_URI }}
      MAINTENANCE_MODE: ${{ vars.MAINTENANCE_MODE }}
      MAINTENANCE_ALLOWED_IPS: ${{ vars.MAINTENANCE_ALLOWED_IPS }}
      MAINTENANCE_STARTED_AT_LABEL: ${{ vars.MAINTENANCE_STARTED_AT_LABEL }}
      MAINTENANCE_STARTED_AT_DATETIME: ${{ vars.MAINTENANCE_STARTED_AT_DATETIME }}
      MAINTENANCE_ENDS_AT_LABEL: ${{ vars.MAINTENANCE_ENDS_AT_LABEL }}
      MAINTENANCE_ENDS_AT_DATETIME: ${{ vars.MAINTENANCE_ENDS_AT_DATETIME }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      GH_ISSUES_TOKEN: ${{ secrets.GH_ISSUES_TOKEN }}
      GITHUB_SHA: ${{ github.sha }}
    steps: &deploy-steps
      - *clean-workspace
      - uses: actions/download-artifact@v4
        with:
          name: workdir
          path: .
      - run: tar --no-overwrite-dir --no-same-owner --no-same-permissions -xzf workdir.tar.gz
      - name: Install deploy tools
        run: |
          rm -f /etc/apt/sources.list.d/google-chrome.list
          apt-get update && apt-get install -y --no-install-recommends rsync
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://deployer.org/releases/v7.5.12/deployer.phar -o /usr/local/bin/dep
          chmod +x /usr/local/bin/dep
      - name: Run deploy
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          eval $(ssh-agent -s)
          echo "$PRIVATE_KEY" | tr -d '\r' | ssh-add -
          dep deploy:ssh_warmup ${{ env.DEPLOY_TARGET }} -f /app/deploy.php -vvv
          echo "Waiting for container to initialize..."
          sleep 10
          dep deploy ${{ env.DEPLOY_TARGET }} -f /app/deploy.php -vvv

  deploy-test:
    if: github.ref == 'refs/heads/master'
    needs: [checks-passed]
    runs-on: [self-hosted, docker, x64]
    environment: test
    container:
      image: skaut/lebeda:8.3-ci
    env:
      DEPLOY_TARGET: test
      PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      ROOT_DIR: /home/vu009010
      SSH_USERNAME: vu009010
      HOST: www.skauting.cz
      PORT: "9010"
      APP_ENV: ${{ vars.APP_ENV }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
      DB_FIX_TOKEN_SHA256: ${{ secrets.DB_FIX_TOKEN_SHA256 }}
      SKAUTIS_TEST_MODE: ${{ vars.SKAUTIS_TEST_MODE }}
      SEND_EMAIL: ${{ vars.SEND_EMAIL }}
      ERROR_EMAILS: ${{ vars.ERROR_EMAILS }}
      ENVIRONMENT_LABEL: ${{ vars.ENVIRONMENT_LABEL }}
      ENVIRONMENT_COLOR: ${{ vars.ENVIRONMENT_COLOR }}
      TEST_BACKGROUND: ${{ vars.TEST_BACKGROUND }}
      TRACY_SHOW_BAR: ${{ vars.TRACY_SHOW_BAR }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      GOOGLE_CREDENTIALS_FILE: ${{ vars.GOOGLE_CREDENTIALS_FILE }}
      GOOGLE_REDIRECT_URI: ${{ vars.GOOGLE_REDIRECT_URI }}
      MAINTENANCE_MODE: ${{ vars.MAINTENANCE_MODE }}
      MAINTENANCE_ALLOWED_IPS: ${{ vars.MAINTENANCE_ALLOWED_IPS }}
      MAINTENANCE_STARTED_AT_LABEL: ${{ vars.MAINTENANCE_STARTED_AT_LABEL }}
      MAINTENANCE_STARTED_AT_DATETIME: ${{ vars.MAINTENANCE_STARTED_AT_DATETIME }}
      MAINTENANCE_ENDS_AT_LABEL: ${{ vars.MAINTENANCE_ENDS_AT_LABEL }}
      MAINTENANCE_ENDS_AT_DATETIME: ${{ vars.MAINTENANCE_ENDS_AT_DATETIME }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      GH_ISSUES_TOKEN: ${{ secrets.GH_ISSUES_TOKEN }}
      GITHUB_SHA: ${{ github.sha }}
    steps: *deploy-steps

  deploy-production:
    if: github.ref == 'refs/heads/master'
    needs: [checks-passed]
    runs-on: [self-hosted, docker, x64]
    environment: production
    container:
      image: skaut/lebeda:8.3-ci
    env:
      DEPLOY_TARGET: production
      PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      ROOT_DIR: /home/vu008930
      SSH_USERNAME: vu008930
      HOST: www.skauting.cz
      PORT: "8930"
      APP_ENV: prod
      APP_BASE_URL: https://h.skauting.cz
      APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
      DB_FIX_TOKEN_SHA256: ${{ secrets.DB_FIX_TOKEN_SHA256 }}
      SKAUTIS_TEST_MODE: "false"
      SEND_EMAIL: "true"
      ERROR_EMAILS: alex@skaut.cz
      TEST_BACKGROUND: "false"
      TRACY_SHOW_BAR: "false"
      DB_HOST: localhost
      DB_NAME: h
      DB_USER: h
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      GOOGLE_CREDENTIALS_FILE: google-credentials.json
      GOOGLE_REDIRECT_URI: https://h.skauting.cz/google/token
      MAINTENANCE_MODE: ${{ vars.MAINTENANCE_MODE }}
      MAINTENANCE_ALLOWED_IPS: ${{ vars.MAINTENANCE_ALLOWED_IPS }}
      MAINTENANCE_STARTED_AT_LABEL: ${{ vars.MAINTENANCE_STARTED_AT_LABEL }}
      MAINTENANCE_STARTED_AT_DATETIME: ${{ vars.MAINTENANCE_STARTED_AT_DATETIME }}
      MAINTENANCE_ENDS_AT_LABEL: ${{ vars.MAINTENANCE_ENDS_AT_LABEL }}
      MAINTENANCE_ENDS_AT_DATETIME: ${{ vars.MAINTENANCE_ENDS_AT_DATETIME }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      GH_ISSUES_TOKEN: ${{ secrets.GH_ISSUES_TOKEN }}
      GITHUB_SHA: ${{ github.sha }}
    steps: *deploy-steps
