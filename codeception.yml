actor: Tester
params:
    - .env
    - .env.ci
    - env

coverage:
    enabled: true
    include:
        - app/*.php

paths:
    tests: tests
    log: tests/_output
    data: tests/_data
    support: tests/_support

bootstrap: _bootstrap.php
settings:
    colors: true
    memory_limit: 1024M
    process_timeout: 600
extensions:
    enabled:
        - Codeception\Extension\RunFailed
modules:
