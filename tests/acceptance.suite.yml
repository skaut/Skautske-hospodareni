# Codeception Test Suite Configuration
#
# Suite for acceptance tests.
# Perform tests in browser using the WebDriver or PhpBrowser.
# If you need both WebDriver and PHPBrowser tests - create a separate suite.

actor: AcceptanceTester
modules:
  enabled:
    - WebDriver:
        url: 'http://moje-hospodareni.cz' # Base URL for tests
        browser: 'chrome' # Browser used for testing
        host: 'selenium' # Selenium server host (Docker compose service name)
        wait: 30 # Max wait time in seconds for elements
        capabilities:
          acceptInsecureCerts: true # Accept self-signed SSL certificates
          goog:chromeOptions:
            args:
              - 'allow-insecure-localhost' # Allow insecure connections to localhost
              - '--ignore-ssl-errors=yes' # Ignore SSL errors
              - '--ignore-certificate-errors' # Ignore certificate errors
              - '--disable-infobars'
              - '--disable-gpu' # Disable GPU acceleration
              - '--no-sandbox' # Disable Chrome's sandboxing
              - '--window-size=1920,1080' # Set the window size
              # SkautIS (HTTPS) POSTuje token zpět na HTTP app -> recentní Chrome jinak zobrazí interstitial
              # "The information you're about to submit is not secure". Origin ošetříme jako bezpečný;
              # --unsafely-treat-insecure-origin-as-secure vyžaduje k účinnosti vlastní --user-data-dir.
              - "--unsafely-treat-insecure-origin-as-secure=http://moje-hospodareni.cz"
              - '--user-data-dir=/tmp/chrome-user-data'
              - '--disable-features=InsecureFormSubmissionInterstitial'


    - \Helper\Acceptance

    - \Helper\WaitForDb
    - Db:
        dsn: "mysql:host=%DB_HOST%;dbname=%DB_NAME%"
        user: "%DB_USER%"
        password: "%DB_PASSWORD%"
        populate: true
        dump: 'tests/_data/acceptance_init.sql'
        wait: 2

env:
  ci:
    modules:
      config:
        WebDriver:
          capabilities:
            goog:chromeOptions:
              args:
                - 'allow-insecure-localhost'
                - '--ignore-ssl-errors=yes'
                - '--ignore-certificate-errors'
                - '--headless'
                - '--disable-infobars'
                - '--disable-gpu'
                - '--no-sandbox'
                - '--window-size=1920,1080'
                - "--unsafely-treat-insecure-origin-as-secure=http://moje-hospodareni.cz"
                - '--user-data-dir=/tmp/chrome-user-data'
                - '--disable-features=InsecureFormSubmissionInterstitial'
