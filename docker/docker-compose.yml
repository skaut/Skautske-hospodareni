networks:
  traefik:

volumes:
  mysql:
  mysql-test:

x-php-base: &php-base
  build:
    context: ./containers/php
  restart: unless-stopped
  working_dir: /app
  environment:
    SHELL: /bin/bash
  env_file:
    - ./containers/php/ini/image.ini
  networks:
    - traefik
  volumes:
    - ../:/app
    - ./containers/php/ini/php.ini:/etc/php/8.3/fpm/conf.d/php.ini
    - ./containers/php/ini/php.ini:/etc/php/8.3/cli/conf.d/php.ini

x-mysql-base: &mysql-base
  image: mysql:8.0
  restart: unless-stopped
  networks:
    - traefik
  environment:
    MYSQL_DATABASE: ${MYSQL_DATABASE}
    MYSQL_USER: ${MYSQL_USER}
    MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    MYSQL_COLLATION: utf8mb4_czech_ci
    MYSQL_CHARACTER_SET: utf8

services:
  traefik:
    image: traefik:v3.6.8
    restart: unless-stopped
    networks:
      - traefik
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./containers/traefik/traefik.yml:/traefik.yml:ro
    labels:
      traefik.enable: true
      traefik.http.routers.api.rule: Host(`traefik.localhost`)
      traefik.http.routers.api.entrypoints: web
      traefik.http.routers.api.service: api@internal

  deploy:
    image: webwingscz/lebeda-deployer-php82
    command: tail -F /dev/null
    container_name: ${COMPOSE_PROJECT_NAME}-deploy
    profiles:
      - deploy
    volumes:
      - ../:/app

  php:
    <<: *php-base
    env_file:
      - containers/php/ini/image.ini
      - ./../.env.local
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - mysql
    labels:
      traefik.enable: true
      traefik.http.routers.php.entrypoints: web

  php-xdebug:
    <<: *php-base
    hostname: php-xdebug.localhost
    depends_on:
      - mysql
    env_file:
      - containers/php/ini/image.ini
      - containers/php/ini/xdebug.ini
      - ./../.env.local
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

  php-test:
    <<: *php-base
    hostname: php-test.localhost
    depends_on:
      - mysql-test
    env_file:
      - containers/php/ini/image.ini
      - containers/php/ini/xdebug.ini
      - ./../.env.test

  nginx:
    image: nginx:latest
    restart: unless-stopped
    hostname: moje-hospodareni.cz
    networks:
      - traefik
    depends_on:
      - php
      - php-xdebug
      - php-test
    volumes:
      - ../:/app
      - ./containers/nginx/conf.d:/etc/nginx/conf.d
    labels:
      traefik.enable: true
      traefik.http.routers.nginx.rule: Host(`moje-hospodareni.cz`)
      traefik.http.routers.nginx.entrypoints: web

  mysql:
    <<: *mysql-base
    hostname: mysql.localhost
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
      - ./containers/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  mysql-test:
    <<: *mysql-base
    hostname: mysql-test.localhost
    volumes:
      - mysql-test:/var/lib/mysql
      - ./containers/mysql-test/my.cnf:/etc/mysql/conf.d/my.cnf

  selenium:
    image: selenium/standalone-chrome
    hostname: selenium.localhost
    shm_size: 2g
    environment:
      SE_VNC_NO_PASSWORD: 1
      SE_SESSION_REQUEST_TIMEOUT: 1000
      SE_NODE_SESSION_TIMEOUT: 1000
      SE_SESSION_RETRY_INTERVAL: 5
      SCREEN_WIDTH: 1920
      SCREEN_HEIGHT: 1080
    depends_on:
      - php-test
      - nginx
      - mysql-test
    networks:
      - traefik
    labels:
      traefik.enable: true
      traefik.http.routers.selenium.rule: Host(`selenium.localhost`)
      traefik.http.routers.selenium.entrypoints: web
      traefik.http.services.selenium.loadbalancer.server.port: 7900

  adminer:
    image: adminer:5.4.0
    restart: unless-stopped
    environment:
      ADMINER_PLUGINS: import-directory readable-dates
      ADMINER_IMPORT_SERVER_PATH: import/adminer.sql
      ADMINER_USERNAME: ${MYSQL_USER}
      ADMINER_PASSWORD: ${MYSQL_PASSWORD}
      ADMINER_DEFAULT_SERVER: mysql
    networks:
      - traefik
    depends_on:
      - mysql
    volumes:
      - ./containers/adminer/plugins/import-directory.php:/var/www/html/plugins/import-directory.php
      - ./containers/adminer/plugins/login-password-less.php:/var/www/html/plugins/login-password-less.php
      - ./containers/adminer/plugins/readable-dates.php:/var/www/html/plugins/readable-dates.php
      - ./containers/adminer/plugins/readable-dates.php:/var/www/html/plugins/dark-switcher.php
      - ./containers/adminer/import:/var/www/html/import
    labels:
      traefik.enable: true
      traefik.http.routers.adminer.entrypoints: web
      traefik.http.routers.adminer.rule: Host(`adminer.localhost`)
      traefik.http.services.adminer.loadbalancer.server.port: 8080
