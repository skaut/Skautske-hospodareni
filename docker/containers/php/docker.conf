[global]
daemonize = no
error_log = /proc/self/fd/2

[www]
user = docker
group = docker
listen = 9000

access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no

pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 5
clear_env = no
